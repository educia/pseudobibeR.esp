f_58_verb_seem:
  # Verbos de evidencialidad epistemica (seem/appear en Biber 1985).
  # biber_espanol_completo.md F_58: solo parecer como equivalente principal.
  # resultar y verse como equivalentes adicionales en registros especificos.
  # Eliminados: aparecer (significado fisico), aparentar, lucir, presentarse,
  # revelarse, sonar, tender, tornarse, volverse (no epistemicos o ya
  # cubiertos por f_41_adj_pred como linking verbs).
  # NOTA: parecer NO se dobla con f_56_verb_private.
  - parecer
  - resultar
  - verse
