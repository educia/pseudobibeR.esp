# ─────────────────────────────────────────────────────────────────────────────
# MODALES (f_52, f_53)
# Nota: detectados como perífrasis verbales en block_modals_es();
# aquí solo los lemas-cabeza de la perífrasis.
# f_54 (predictivo) se detecta por morfología Tense=Fut en código.
# ─────────────────────────────────────────────────────────────────────────────

f_52_modal_possibility:
  # Posibilidad dinámica / epistémica
  - poder
  - caber   # "cabe la posibilidad de"

f_53_modal_necessity:
  # Obligación / necesidad -- equivalentes de ought/should/must en Biber (1985).
  # biber_espanol_completo.md F_53: deber+inf, tener_que+inf, hay_que+inf.
  # necesitar eliminado: es verbo pleno, no modal gramaticalizado; su inclusion
  # sobreestimaría f_53 en textos con verbos de necesidad lexica.
  - deber
  - tener_que
  - haber_de
  - haber_que

