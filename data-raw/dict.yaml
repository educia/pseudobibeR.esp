# Spanish linguistic feature dictionaries for Biber (1985) framework
#
# TOKENIZATION AND PATTERN FORMATTING:
#
# Patterns use underscores for token boundaries, following pseudobibeR conventions:
#   - Multiword items: "por ejemplo" -> "por_ejemplo"
#   - Clitics or multi-token sequences: "tener que" -> "tener_que"
#   - The matching is done over lemmas or surface forms depending on the
#     feature; keep entries in lower case and in infinitive form for verbs
#     unless a downstream heuristic expects otherwise.
#
# This file defines only features whose detection genuinely relies on
# lexical lists (adverbials, pronouns, discourse markers, modals and
# specialized verb classes). Other Biber features for Spanish are
# implemented via UD POS/morphology and dependency patterns in code.
#
# FUENTES:
#   Biber, D. (1988). Variation across speech and writing. Cambridge UP.
#   Biber, D. et al. (1999). Longman grammar of spoken and written English.
#   Lavid, J. et al. (2010). Systemic-functional descriptions of Spanish.
#   Adaptaciones propias para el español peninsular y latinoamericano.

