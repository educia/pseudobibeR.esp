# spanish_examples.yaml
# Ejemplos por rasgo para pseudobibeR.es
#
# Formato: cada entrada tiene tres campos:
#   feature: nombre del rasgo (f_XX_nombre) -- debe coincidir EXACTAMENTE
#             con el nombre de columna producido por biber_es()
#   example: oración en español que activa exactamente ese rasgo
#   count:   número esperado de ocurrencias del rasgo en ese ejemplo
#
# Las oraciones son sintéticas (construidas a propósito) para maximizar
# la precisión del conteo. Se asume modelo UDPipe spanish-gsd.
#
# NOTAS:
#  - f_01 (pretérito indefinido): verbos con Tense=Past, Mood=Ind, VerbForm=Fin
#    Ej.: llegó, presentaron, fue (indefinido).
#  - f_71 (pretérito imperfecto, extensión española): Tense=Imp
#    Ej.: caminaba, estudiábamos (imperfecto).
#  - f_09, f_12, f_15, f_28, f_31, f_32, f_59, f_60, f_61, f_62: ELIMINADOS
#    (intraducibles); no aparecen en el output de biber_es().
#  - f_43 (TTR) y f_44 (longitud media) dependen del texto completo;
#    no se incluyen aquí.
#  - Algunos rasgos (f_22, f_23, f_26, f_39) muestran divergencias conocidas
#    con UDPipe spanish-gsd; están marcados como relaxed en el test.

# ─────────────────��─────────────────────────────��─────────────────────────────
# TIEMPO VERBAL
# ────────────────────────────────────────────────────────────────────────────��

