# ─────────────────────────────────────────────────────────────────────────────
# CLÁUSULAS RELATIVAS
# ─────────────────────────────────────────────────────────────────────────────

# f_29: fusión de f_29 (that-relativo sujeto) + f_31 (wh-relativo sujeto)
# En español "que" cubre both that y who/which en posición de sujeto.
- feature: f_29_that_subj
  example: "El estudiante que llegó tarde no pudo entrar."
  count: 1.0

# f_30: fusión de f_30 (that-relativo objeto) + f_32 (wh-relativo objeto)
# En Spanish-GSD "que" relativo es siempre SCONJ/mark (absorbido en f_29).
# f_30 detecta "quien/cual" en posición de objeto (dep_rel=obl/obj).
- feature: f_30_that_obj
  example: "La persona con quien hablé es muy amable."
  count: 1.0

# f_31_wh_subject ABSORBIDO en f_29_that_subj (fusión española).
# f_32_wh_object  ABSORBIDO en f_30_that_obj  (fusión española).

